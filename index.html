<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>디어마이팟 (Dear My Pot) 3x3 타이쿤</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f7f3e9; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .header { text-align: center; margin-bottom: 20px; }
        .score-board { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 10px; }
        #grid { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 10px; width: 320px; height: 320px; }
        .cell { background-color: #e2dcd0; border-radius: 15px; width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; user-select: none; overflow: hidden; }
        .target { width: 90%; height: 90%; object-fit: cover; border-radius: 50%; position: absolute; pointer-events: auto; }
        .poop { font-size: 60px; pointer-height: 1; line-height: 1; pointer-events: auto; margin-top: -5px; }
        .floating-text { position: absolute; font-size: 20px; font-weight: bold; pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 10; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-30px); } }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        #startBtn { padding: 15px 40px; font-size: 20px; font-weight: bold; background-color: #4a3b32; color: white; border: none; border-radius: 30px; margin-top: 30px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="header">
        <div class="score-board">🏆 점수: <span id="score">0</span> | ⏱️ 시간: <span id="time">30</span>초</div>
    </div>
    <div id="grid"></div>
    <button id="startBtn" onclick="startGame()">▶ 게임 시작</button>

    <script>
        const cats = [
            'https://i.imgur.com/BqS2HmF.jpeg', // Jenny
            'https://i.imgur.com/hSiAPlN.jpeg', // Mini
            'https://i.imgur.com/4LRDlrq.jpeg'  // Nani
        ];
        const pot = 'https://i.imgur.com/O2ZPhRb.jpeg';
        let score = 0, time = 30, gameInterval, timerInterval, isPlaying = false;
        let audioCtx;

        function initAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } if (audioCtx.state === 'suspended') { audioCtx.resume(); } }
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'cat') { osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); } 
            else if (type === 'pot') { osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.2); gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); osc.start(); osc.stop(audioCtx.currentTime + 0.2); } 
            else if (type === 'poop') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.3); gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
        }

        const grid = document.getElementById('grid');
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            cell.addEventListener('mousedown', (e) => handleMiss(e, cell));
            cell.addEventListener('touchstart', (e) => { e.preventDefault(); handleMiss(e, cell); });
            grid.appendChild(cell);
        }

        function showFloatingText(cell, text, color) {
            const el = document.createElement('div');
            el.className = 'floating-text'; el.innerText = text; el.style.color = color;
            cell.appendChild(el); setTimeout(() => el.remove(), 1000);
        }

        function updateScore(points) { score += points; document.getElementById('score').innerText = score; }

        function handleHit(e, type, cell) {
            e.stopPropagation();
            if (!isPlaying) return;
            initAudio();
            
            // 이미지나 똥만 지우고, 둥둥 떠다니는 글자는 지우지 않도록 수정!
            const target = cell.querySelector('.target, .poop');
            if (target) target.remove();

            if (type === 'cat') { playSound('cat'); updateScore(10); showFloatingText(cell, '🍀', '#4CAF50'); } 
            else if (type === 'pot') { playSound('pot'); updateScore(20); showFloatingText(cell, '디어마이팟', '#FF9800'); } 
            else if (type === 'poop') { 
                playSound('poop'); updateScore(-20); showFloatingText(cell, '킹받쥬? 🤪', '#F44336'); 
                document.body.classList.add('shake'); setTimeout(() => document.body.classList.remove('shake'), 500); 
                clearGrid(); 
            }
        }

        function handleMiss(e, cell) {
            // 셀 안에 둥둥 떠다니는 글자가 있어도 타겟(이미지/똥)이 없으면 Miss 처리!
            if (!isPlaying || cell.querySelector('.target, .poop')) return; 
            updateScore(-10); showFloatingText(cell, '-10', '#999');
        }

        function clearGrid() { 
            // 둥둥 떠다니는 글자(floating-text)는 절대 건드리지 말고 타겟만 삭제!
            document.querySelectorAll('.target, .poop').forEach(el => el.remove()); 
        }

        function spawn() {
            if (!isPlaying) return;
            clearGrid();
            const cells = document.querySelectorAll('.cell');
            const randomCell = cells[Math.floor(Math.random() * cells.length)];
            const rand = Math.random();
            let el;
            
            if (rand < 0.5) { 
                el = document.createElement('img'); el.src = cats[Math.floor(Math.random() * cats.length)]; el.className = 'target';
                el.addEventListener('mousedown', (e) => handleHit(e, 'cat', randomCell));
                el.addEventListener('touchstart', (e) => { e.preventDefault(); handleHit(e, 'cat', randomCell); });
            } else if (rand < 0.8) { 
                el = document.createElement('img'); el.src = pot; el.className = 'target';
                el.addEventListener('mousedown', (e) => handleHit(e, 'pot', randomCell));
                el.addEventListener('touchstart', (e) => { e.preventDefault(); handleHit(e, 'pot', randomCell); });
            } else { 
                el = document.createElement('div'); el.innerText = '💩'; el.className = 'poop';
                el.addEventListener('mousedown', (e) => handleHit(e, 'poop', randomCell));
                el.addEventListener('touchstart', (e) => { e.preventDefault(); handleHit(e, 'poop', randomCell); });
            }
            randomCell.appendChild(el);
        }

        function startGame() {
            initAudio();
            document.getElementById('startBtn').style.display = 'none';
            score = 0; time = 30; updateScore(0); document.getElementById('time').innerText = time;
            isPlaying = true;
            clearGrid();
            
            gameInterval = setInterval(spawn, 800);
            timerInterval = setInterval(() => {
                time--; document.getElementById('time').innerText = time;
                if (time <= 0) {
                    isPlaying = false;
                    clearInterval(gameInterval); clearInterval(timerInterval);
                    clearGrid();
                    alert(`게임 종료! 최종 점수: ${score}점`);
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('startBtn').innerText = '다시 하기';
                }
            }, 1000);
        }
    </script>
</body>
</html>
